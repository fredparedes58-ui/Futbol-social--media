name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Tests (Vitest)
        run: npm test

      - name: Typecheck + Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true
