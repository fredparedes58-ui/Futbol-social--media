name: Expo CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build_and_test:
    name: Build & Lint Expo App
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # 4. TypeScript type-check
      - name: 🔍 TypeScript Check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true

      # 5. Expo Doctor (validates config)
      - name: 🩺 Expo Doctor
        run: npx expo-doctor@latest
        continue-on-error: true

      # 6. Export web build (validates compilation)
      - name: 🔨 Export Web Build
        run: npx expo export --platform web

      # 7. Upload web build artifact
      - name: 📤 Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/

      # 8. Notification Webhook
      - name: 🔔 Notify build result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_MSG="✅ Build Exitoso"
          else
            STATUS_MSG="❌ Build Fallido"
          fi

          if [ -n "${{ secrets.WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{
                "mensaje": "'"$STATUS_MSG"'",
                "proyecto": "${{ github.repository }}",
                "rama": "${{ github.ref_name }}",
                "commit": "${{ github.sha }}"
              }' || true
          fi
